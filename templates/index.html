<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Language Detection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1.2rem 2rem;
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      border-bottom: 2px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.6rem;
      color: #00d4ff;
      letter-spacing: 1px;
    }

    header span.badge {
      background: #00d4ff22;
      color: #00d4ff;
      border: 1px solid #00d4ff55;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.75rem;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      padding: 2rem;
      max-width: 1200px;
      width: 100%;
      justify-content: center;
    }

    /* --- Live Feed Section --- */
    .card {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      overflow: hidden;
      flex: 1 1 460px;
      max-width: 600px;
    }

    .card-header {
      padding: 0.8rem 1.2rem;
      background: #16213e;
      font-size: 0.9rem;
      color: #00d4ff;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #0f3460;
    }

    .card-body {
      padding: 1.2rem;
    }

    #live-feed {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: block;
    }

    /* --- Upload Section --- */
    .upload-area {
      border: 2px dashed #0f3460;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .upload-area:hover { border-color: #00d4ff; }

    .upload-area p { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }

    #file-input { display: none; }

    #preview-img {
      width: 100%;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
    }

    #result-img {
      width: 100%;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
      border: 2px solid #00d4ff44;
    }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.6rem;
      background: #00d4ff;
      color: #0f0f1a;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #detections {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #aaa;
      background: #0f0f1a;
      border-radius: 6px;
      padding: 0.8rem;
      max-height: 160px;
      overflow-y: auto;
      display: none;
    }

    #detections .det-item {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      justify-content: space-between;
    }

    #detections .det-item:last-child { border-bottom: none; }

    .det-label { color: #00d4ff; font-weight: 600; }
    .det-conf  { color: #aaa; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #666;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00d4ff;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>
  <h1>Sign Language Detection</h1>
  <span class="badge">YOLOv5 Powered</span>
</header>

<div class="container">

  <!-- Live Webcam Feed -->
  <div class="card">
    <div class="card-header">Live Webcam Detection</div>
    <div class="card-body">
      <img id="live-feed" src="/video_feed" alt="Live feed" />
      <div class="status-row">
        <div class="dot"></div>
        <span>Streaming live detections from webcam</span>
      </div>
    </div>
  </div>

  <!-- Image Upload -->
  <div class="card">
    <div class="card-header">Upload Image for Detection</div>
    <div class="card-body">

      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <svg width="40" height="40" fill="none" stroke="#00d4ff" stroke-width="1.5"
             viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 16V8m0 0-3 3m3-3 3 3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>Click to select an image (JPG / PNG)</p>
      </div>

      <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)" />
      <img id="preview-img" alt="Preview" />
      <img id="result-img" alt="Detection result" />

      <div style="text-align:center">
        <button class="btn" id="predict-btn" onclick="runPrediction()" disabled>
          Run Detection
        </button>
      </div>

      <div id="detections"></div>
    </div>
  </div>

</div><!-- /.container -->

<script>
  let selectedFile = null;

  function previewImage(event) {
    selectedFile = event.target.files[0];
    if (!selectedFile) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const prev = document.getElementById('preview-img');
      prev.src = e.target.result;
      prev.style.display = 'block';

      document.getElementById('result-img').style.display = 'none';
      document.getElementById('detections').style.display = 'none';
      document.getElementById('predict-btn').disabled = false;
    };
    reader.readAsDataURL(selectedFile);
  }

  function runPrediction() {
    if (!selectedFile) return;

    const btn = document.getElementById('predict-btn');
    btn.disabled = true;
    btn.textContent = 'Detecting…';

    const reader = new FileReader();
    reader.onload = async (e) => {
      // strip data URL prefix, keep only base64 payload
      const b64 = e.target.result.split(',')[1];

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: b64 }),
        });

        const data = await res.json();

        if (data.error) {
          alert('Error: ' + data.error);
          return;
        }

        // Show annotated result
        const resultImg = document.getElementById('result-img');
        resultImg.src = 'data:image/jpeg;base64,' + data.image;
        resultImg.style.display = 'block';

        // Show detections list
        const detBox = document.getElementById('detections');
        if (data.detections && data.detections.length > 0) {
          detBox.innerHTML = data.detections.map(d => `
            <div class="det-item">
              <span class="det-label">${d.name}</span>
              <span class="det-conf">${(d.confidence * 100).toFixed(1)}%</span>
            </div>
          `).join('');
        } else {
          detBox.innerHTML = '<div style="color:#666;text-align:center">No detections found.</div>';
        }
        detBox.style.display = 'block';

      } catch (err) {
        alert('Request failed: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Detection';
      }
    };
    reader.readAsDataURL(selectedFile);
  }
</script>

</body>
</html>
